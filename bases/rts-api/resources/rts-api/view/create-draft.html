{% extends "rts-api/template/entrypoint.html" %}

{% block content %}
<section class="resource">
    <h2>Create Draft</h2>
    <form id="create-draft-form" class="form">
        <div class="form-group">
            <label class="form-label required" for="faction-eid">Faction</label>
            <select id="faction-eid" class="select" required>
                <option value="">Select a faction</option>
                {% for faction in factions %}
                <option value="{{faction.eid}}">{{faction.name}}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="form-label required" for="game-mode-eid">Game Mode</label>
            <select id="game-mode-eid" class="select" required>
                <option value="">Select a game mode</option>
                {% for mode in game-modes %}
                <option value="{{mode.eid}}">{{mode.name}}</option>
                {% endfor %}
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create Draft</button>
        </div>
        <div id="create-draft-error" class="form-error" hidden></div>
    </form>
    <script>
        document.getElementById('create-draft-form').addEventListener('submit', async function (e) {
            e.preventDefault();
            const factionEid = document.getElementById('faction-eid').value;
            const gameModeEid = document.getElementById('game-mode-eid').value;
            const draftEid = crypto.randomUUID();
            const errorEl = document.getElementById('create-draft-error');
            errorEl.hidden = true;
            try {
                const response = await fetch('/api/draft/' + draftEid + '?version=1', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json', 'Accept': 'application/json'},
                    body: JSON.stringify({
                        specification: {'faction-eid': factionEid, 'game-mode-eid': gameModeEid}
                    })
                });
                if (response.ok) {
                    window.location.href = '/view/game/{{game-eid}}/draft/me.html';
                } else {
                    errorEl.textContent = 'Failed to create draft. Please try again.';
                    errorEl.hidden = false;
                }
            } catch (_) {
                errorEl.textContent = 'An unexpected error occurred. Please try again.';
                errorEl.hidden = false;
            }
        });
    </script>
</section>
{% endblock %}
