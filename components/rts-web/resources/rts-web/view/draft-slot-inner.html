<button class="draft-slot-card-button"
        id="draft-slot-card-{{unit.entry-eid}}"
        hx-preserve="true"
        type="button"
        aria-label="Edit {{unit.name}}{% if unit.mark %} (Mark of {{unit.mark|capitalize}}){% endif %} in {{section.section-label}}"
        hx-get="/api/draft/{{section.draft-eid}}/entry/{{unit.entry-eid}}?section={{section.section}}&amp;embed=unit"
        hx-target="#draft-unit"
        hx-swap="outerHTML">
    <img class="draft-slot-card"
         id="draft-slot-card-img-{{unit.entry-eid}}"
         src="/card/unit/{% if unit.lore-portrait-key %}{{unit.lore-portrait-key}}{% else %}{{unit.eid}}{% endif %}.png"
         alt="{{unit.name}}"
         onerror="this.src='/card/unit/placeholder.png'; this.onerror=null;">
    {% if unit.mark %}<span class="unit-mark--dot unit-mark--{{unit.mark}} draft-slot-mark" aria-hidden="true" title="Mark of {{unit.mark|capitalize}}"></span>{% endif %}
</button>
<div class="draft-slot-cost" id="draft-slot-cost-{{unit.entry-eid}}" aria-hidden="true">{{unit.total-cost}}</div>
<button class="draft-slot-remove"
        aria-label="Remove {{unit.name}} from {{section.section-label}}"
        hx-delete="/api/draft/{{section.draft-eid}}/entry/{{unit.entry-eid}}?section={{section.section}}"
        hx-swap="none">&#10005;</button>
