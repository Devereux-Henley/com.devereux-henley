<section class="resource season-resource" aria-labelledby="season-heading">
  <h2 id="season-heading" data-type="season/season">{{ data.name }}</h2>
  <dl>
    <dt>eid</dt><dd>{{ data.eid }}</dd>
    {% if data._links.league %}<dt>league</dt><dd><a href="{{ data._links.league }}">league</a></dd>{% endif %}
  </dl>
  {% if data._links.faction-standings %}
  <nav><a href="{{ data._links.faction-standings }}">faction-standings</a></nav>
  {% endif %}
</section>
