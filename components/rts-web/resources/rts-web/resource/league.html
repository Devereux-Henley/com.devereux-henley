<section class="resource league-resource" aria-labelledby="league-heading">
  <h2 id="league-heading" data-type="league/league">{{ data.name }}</h2>
  <dl>
    <dt>eid</dt><dd>{{ data.eid }}</dd>
    {% if data._links.game %}<dt>game</dt><dd><a href="{{ data._links.game }}">game</a></dd>{% endif %}
  </dl>
  <nav>
    <a href="{{ data._links.seasons }}" rel="seasons">seasons</a>
    {% if data._links.faction-standings %}<a href="{{ data._links.faction-standings }}">faction-standings</a>{% endif %}
  </nav>
</section>
