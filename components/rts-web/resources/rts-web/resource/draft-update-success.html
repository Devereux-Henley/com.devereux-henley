<div id="draft-action-error" role="alert" aria-live="polite" hidden hx-swap-oob="true"></div>
<div id="draft-slot-cost-{{data.entry-eid}}" class="draft-slot-cost" aria-hidden="true" hx-swap-oob="true">{{data.total-cost}}</div>
<img id="draft-slot-card-img-{{data.entry-eid}}"
     class="draft-slot-card"
     src="/card/unit/{{data.slot-portrait-key}}.png"
     alt="{{data.entry._embedded.unit.name}}"
     hx-swap-oob="true"
     onerror="this.src='/card/unit/placeholder.png'; this.onerror=null;">
{% with budget=data.budget oob="oob" %}{% include "rts-web/view/draft-budget-group.html" %}{% endwith %}
{% with unit=data.entry._embedded.unit data=data.entry %}{% include "rts-web/view/draft-unit-panel.html" %}{% endwith %}
