<section class="resource" aria-labelledby="faction-heading">
    <h2 id="faction-heading">{{data.name}}</h2>
    <p>{{data.description|linebreaks|safe}}</p>
    <nav aria-label="Faction sub-resources">
        <ul>
            <li><a href="/api/unit?faction-eid={{data.eid}}">units</a></li>
            {% if data._links.game %}<li><a href="{{ data._links.game }}">game</a></li>{% endif %}
        </ul>
    </nav>
</section>
