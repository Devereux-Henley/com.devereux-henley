<section class="collection tournament-games" aria-labelledby="tournament-games-heading">
  <h2 id="tournament-games-heading" data-type="tournament/games">Games</h2>
  <ul>
    {% for g in data.games %}
    <li data-winner-sub="{{ g.winner-sub }}">{{ g.winner-sub }}</li>
    {% endfor %}
  </ul>
  <dl>
    {% if data._links.tournament %}<dt>tournament</dt><dd><a href="{{ data._links.tournament }}">{{ data.tournament-eid }}</a></dd>{% endif %}
    {% if data._links.match %}<dt>match</dt><dd><a href="{{ data._links.match }}">{{ data.match-eid }}</a></dd>{% endif %}
  </dl>
</section>
